{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MyApp</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
       <!--
         <div class="robot-section">
             <img src="{% static 'images/robot1.png' %}" alt="Robot">
         </div>
        -->
        <div class="auth-container">
            <h2>Login</h2>
            <form id="loginForm" autocomplete="off" method="post" novalidate>
                <div class="form-group">
                    {% csrf_token %}
                    <input type="email" name="email" placeholder="Email">
                    <span class="error-message">Valid email required</span>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password">
                    <span class="error-message">Password required (min 4 chars)</span>
                </div>
                <div class="to-forget">
                     <a href="{%url 'forgot-password' %}">Forgot Password?</a>
                </div>
                    <button type="submit" class="login-btn">Login</button>
                <div class="to-signup">
                    New user? <a href="{%url 'sign-up' %}">Sign up </a>
                </div>
                <button type="button" class="btn-apple" >Login with Apple  </button>
                <button type="button" class="btn-google">Login with Google</button>
            </form>
            <p id="login-message"></p>
        </div>
    </div>
    <script>
        $(document).ready(function () {
            $('#loginForm').on('submit', function (e) {
                e.preventDefault();
                $.ajax({
                    url: "{% url 'login' %}",
                    type: "POST",
                    data: $(this).serialize(),
                    success: function (response) {
                        if (response.success) {
                            // ✅ Redirect to home page
                            window.location.href = "{% url 'home' %}";
                        } else {
                            $('#login-message').text(response.message).css("color", "red");
                        }
                    },
                    error: function () {
                        $('#login-message').text("Something went wrong").css("color", "red");
                    }
                });
            });
        });
    </script>

</body>
</html>
