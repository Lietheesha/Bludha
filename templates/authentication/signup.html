<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | MyApp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
      <h2>Sign Up</h2>
      <form id="signupForm" autocomplete="off" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" required placeholder="First name">
            <span class="error-message">First name required</span>
          </div>
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" required placeholder="Last name">
            <span class="error-message">Last name required</span>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" required placeholder="you@email.com">
          <span class="error-message">Valid email required</span>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" required minlength="4" pattern=".{4,}" placeholder="Password (min 4 chars)">
          <span class="error-message">Password required (min 4 chars)</span>
        </div>
        <div class="form-group">
          <label for="signup-confirm-password">Confirm Password</label>
          <input type="password" id="signup-confirm-password" name="confirmPassword" required minlength="4" pattern=".{4,}" placeholder="Retype password">
          <span class="error-message">Confirm password required</span>
        </div>
        <div class="error-message match-error" aria-live="polite" style="display:none;">Passwords do not match</div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
        <div class="divider">OR</div>
        <button type="button" class="btn btn-google" tabindex="-1">Sign up with Google</button>
        <button type="button" class="btn btn-apple" tabindex="-1">Sign up with Apple</button>
        <div class="to-login">
          Already have an account? <a href="index.html">Login here</a>
        </div>
      </form>
    </div>
    <!-- "Passwords do not match" validation: You must do this after submit on the server (no JS allowed).
         Optionally, put a note for users. -->
    <script>
    $(document).ready(function () {

        var form = document.getElementById('signupForm');

        if (form) {
            form.addEventListener('submit', function (ev) {

                var pwd1 = document.getElementById('signup-password');
                var pwd2 = document.getElementById('signup-confirm-password');
                var error = document.querySelector('.match-error');

                if (pwd1.value !== pwd2.value) {
                    if (error) error.style.display = 'block';
                    ev.preventDefault();
                }
            });
        }

    });
    </script>

</body>
</html>
