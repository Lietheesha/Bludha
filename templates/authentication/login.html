{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MyApp</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <div class="robot-section">
            <img src="{% static 'images/robot1.png' %}" alt="Robot">
        </div>
        <div class="auth-container">
            <h2>Login</h2>
            <form id="loginForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <input type="email" placeholder="Email">
                    <span class="error-message">Valid email required</span>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password">
                    <span class="error-message">Password required (min 4 chars)</span>
                </div>
                    <button type="submit" class="login-btn">Login</button>
                <div class="to-signup">
                    New user? <a href="signup.html">Sign up </a>
                </div>
                <button type="button" class="btn-apple" >Login with Apple</button>
                <button type="button" class="btn-google">Login with Google</button>
            </form>
        </div>
    </div>
</body>
</html>
